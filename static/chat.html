<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow — 채팅</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50 flex flex-col">
  <nav class="bg-white shadow px-6 py-3 flex justify-between items-center shrink-0">
    <div class="flex items-center gap-3">
      <a href="/teams" class="text-gray-400 hover:text-gray-600 text-sm">← 팀 목록</a>
      <span class="text-blue-600 font-bold text-lg">TaskFlow</span>
      <span id="team-name" class="text-sm text-gray-500"></span>
    </div>
    <div class="flex gap-2">
      <a id="kanban-link" href="#" class="text-sm bg-blue-100 text-blue-700 px-3 py-1 rounded hover:bg-blue-200">칸반</a>
      <button id="logout-btn" class="text-sm text-gray-400 hover:text-red-500">로그아웃</button>
    </div>
  </nav>

  <p id="error-msg" class="hidden bg-red-50 text-red-600 text-sm rounded p-2 mx-4 mt-2 shrink-0"></p>

  <!-- 메시지 목록 -->
  <div id="msg-list" class="flex-1 overflow-y-auto px-4 py-4 space-y-3">
    <p class="text-center text-gray-400 text-sm">채팅을 불러오는 중...</p>
  </div>

  <!-- 입력 영역 -->
  <div class="bg-white border-t px-4 py-3 shrink-0">
    <form id="msg-form" class="flex gap-2">
      <input id="msg-input" type="text" placeholder="메시지 입력..." maxlength="1000" autocomplete="off"
        class="flex-1 border border-gray-300 rounded-full px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
      <button type="submit"
        class="bg-blue-600 hover:bg-blue-700 text-white rounded-full px-5 py-2 text-sm font-medium">전송</button>
    </form>
    <p class="text-xs text-gray-300 text-right mt-1">5초 자동 새로고침</p>
  </div>

  <script src="/static/app.js"></script>
  <script>
    if (!requireAuth()) throw new Error();
    const teamId = getTeamId();
    if (!teamId) { window.location.href = '/teams'; throw new Error(); }
    document.getElementById('kanban-link').href = `/kanban?team=${teamId}`;

    const me = getUser();
    let lastSince = null;
    let pollInterval = null;

    function renderMessage(m) {
      const isMe = m.user_id === me?.id;
      const div = document.createElement('div');
      div.className = `flex ${isMe ? 'justify-end' : 'justify-start'}`;
      const time = new Date(m.created_at).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
      div.innerHTML = isMe
        ? `<div class="max-w-xs">
            <div class="bg-blue-500 text-white rounded-2xl rounded-tr-sm px-4 py-2 text-sm">${escHtml(m.content)}</div>
            <p class="text-xs text-gray-400 text-right mt-0.5">${time}</p>
           </div>`
        : `<div class="max-w-xs">
            <p class="text-xs text-gray-500 mb-0.5 ml-1">${escHtml(m.sender_email)}</p>
            <div class="bg-white border rounded-2xl rounded-tl-sm px-4 py-2 text-sm shadow-sm">${escHtml(m.content)}</div>
            <p class="text-xs text-gray-400 ml-1 mt-0.5">${time}</p>
           </div>`;
      return div;
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function scrollBottom() {
      const list = document.getElementById('msg-list');
      list.scrollTop = list.scrollHeight;
    }

    async function loadInitial() {
      try {
        const msgs = await api('GET', `/api/teams/${teamId}/messages`);
        const list = document.getElementById('msg-list');
        list.innerHTML = '';
        if (!msgs.length) {
          list.innerHTML = '<p class="text-center text-gray-400 text-sm">첫 메시지를 보내보세요!</p>';
        } else {
          msgs.forEach(m => list.appendChild(renderMessage(m)));
          lastSince = msgs[msgs.length - 1].created_at;
        }
        scrollBottom();

        // 팀 이름
        const teams = await api('GET', '/api/teams');
        const team = teams.find(t => String(t.id) === String(teamId));
        if (team) document.getElementById('team-name').textContent = `— ${team.name}`;
      } catch (err) { showError(err.message); }
    }

    async function pollMessages() {
      if (!lastSince) return;
      try {
        const msgs = await api('GET', `/api/teams/${teamId}/messages?since=${lastSince}`);
        if (msgs.length) {
          const list = document.getElementById('msg-list');
          const wasAtBottom = list.scrollHeight - list.clientHeight - list.scrollTop < 60;
          msgs.forEach(m => list.appendChild(renderMessage(m)));
          lastSince = msgs[msgs.length - 1].created_at;
          if (wasAtBottom) scrollBottom();
        }
      } catch (err) { /* 폴링 중 에러는 무시 */ }
    }

    document.getElementById('msg-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const content = document.getElementById('msg-input').value.trim();
      if (!content) return;
      document.getElementById('msg-input').value = '';
      try {
        const m = await api('POST', `/api/teams/${teamId}/messages`, { content });
        const list = document.getElementById('msg-list');
        // 빈 상태 텍스트 제거
        const empty = list.querySelector('p.text-center');
        if (empty) empty.remove();
        list.appendChild(renderMessage(m));
        lastSince = m.created_at;
        scrollBottom();
      } catch (err) { showError(err.message); }
    });

    document.getElementById('logout-btn').addEventListener('click', async () => {
      clearInterval(pollInterval);
      await api('POST', '/api/auth/logout').catch(() => {});
      clearAuth(); window.location.href = '/';
    });

    loadInitial().then(() => {
      pollInterval = setInterval(pollMessages, 5000);
    });
  </script>
</body>
</html>
