<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow — 팀 선택</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50">
  <nav class="bg-white shadow px-6 py-3 flex justify-between items-center">
    <span class="bg-teal-600 text-white font-bold px-3 py-1 rounded text-sm">TaskFlow</span>
    <div class="flex items-center gap-3">
      <span id="user-email" class="text-sm text-gray-500"></span>
      <button id="logout-btn" class="text-sm text-gray-400 hover:text-red-500">로그아웃</button>
    </div>
  </nav>

  <!-- 기본 화면 -->
  <div id="main-view" class="max-w-lg mx-auto mt-10 px-4">
    <p id="error-msg" class="hidden bg-red-50 text-red-600 text-sm rounded p-2 mb-4"></p>
    <div class="bg-teal-50 border border-teal-200 rounded-lg p-3 mb-5 text-sm text-teal-700">
      ⓘ 아직 팀에 소속되지 않았습니다. 팀을 만들거나 초대코드로 합류하세요.
    </div>

    <div class="grid grid-cols-2 gap-4">
      <!-- 새 팀 만들기 -->
      <div class="bg-white shadow rounded-lg p-5">
        <h2 class="font-semibold text-gray-700 mb-3">+ 새 팀 만들기</h2>
        <form id="create-form">
          <input id="team-name" type="text" placeholder="팀 이름 (1-30자)" required maxlength="30"
            class="w-full border border-gray-300 rounded px-3 py-2 text-sm mb-3 focus:outline-none focus:ring-2 focus:ring-teal-400">
          <button id="create-btn" type="submit"
            class="w-full bg-teal-600 hover:bg-teal-700 text-white text-sm rounded py-2 font-medium">만들기</button>
        </form>
      </div>

      <!-- 초대코드로 합류 -->
      <div class="bg-white shadow rounded-lg p-5">
        <h2 class="font-semibold text-gray-700 mb-3">초대코드로 합류</h2>
        <form id="join-form">
          <input id="invite-code" type="text" placeholder="ABCD-1234" required maxlength="9"
            class="w-full border border-gray-300 rounded px-3 py-2 text-sm mb-3 uppercase tracking-widest focus:outline-none focus:ring-2 focus:ring-teal-400">
          <button id="join-btn" type="submit"
            class="w-full bg-gray-700 hover:bg-gray-800 text-white text-sm rounded py-2 font-medium">합류</button>
        </form>
      </div>
    </div>
  </div>

  <!-- 팀 생성 성공 화면 -->
  <div id="success-view" class="hidden max-w-md mx-auto mt-16 px-4 text-center">
    <div class="bg-white shadow rounded-lg p-8">
      <div class="text-4xl mb-4">🎉</div>
      <h2 class="text-xl font-bold text-gray-800 mb-1" id="success-team-name"></h2>
      <p class="text-gray-500 text-sm mb-6">팀이 생성됐습니다. 초대코드를 공유하세요.</p>
      <div class="bg-gray-100 rounded-lg px-4 py-3 flex items-center justify-between mb-6">
        <span id="success-invite-code" class="font-mono text-xl font-bold tracking-widest text-teal-700"></span>
        <button id="copy-btn" onclick="copyInviteCode()"
          class="text-xs bg-teal-600 hover:bg-teal-700 text-white px-3 py-1 rounded">복사</button>
      </div>
      <a id="start-kanban-btn" href="#"
        class="block w-full bg-teal-600 hover:bg-teal-700 text-white font-semibold rounded py-2 text-sm">
        칸반 시작하기 →
      </a>
    </div>
  </div>

  <script src="/static/app.js"></script>
  <script>
    if (!requireAuth()) throw new Error();
    const user = getUser();
    document.getElementById('user-email').textContent = user?.email || '';

    function copyInviteCode() {
      const code = document.getElementById('success-invite-code').textContent;
      navigator.clipboard.writeText(code).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = '✓ 복사됨';
        setTimeout(() => btn.textContent = '복사', 1500);
      });
    }

    function showSuccess(team) {
      document.getElementById('main-view').classList.add('hidden');
      document.getElementById('success-view').classList.remove('hidden');
      document.getElementById('success-team-name').textContent = team.name;
      document.getElementById('success-invite-code').textContent = team.invite_code;
      document.getElementById('start-kanban-btn').href = `/kanban?team=${team.id}`;
      // team_id 저장
      const u = getUser();
      if (u) { u.team_id = team.id; saveAuth(getToken(), u); }
    }

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await api('POST', '/api/auth/logout').catch(() => {});
      clearAuth(); window.location.href = '/';
    });

    document.getElementById('create-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('create-btn');
      setLoading(btn, true);
      try {
        const team = await api('POST', '/api/teams', { name: document.getElementById('team-name').value });
        showSuccess(team);
      } catch (err) {
        showError(err.message);
        setLoading(btn, false);
      }
    });

    document.getElementById('join-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('join-btn');
      setLoading(btn, true);
      try {
        const team = await api('POST', '/api/teams/join', {
          invite_code: document.getElementById('invite-code').value.toUpperCase()
        });
        const u = getUser();
        if (u) { u.team_id = team.id; saveAuth(getToken(), u); }
        window.location.href = `/kanban?team=${team.id}`;
      } catch (err) {
        showError(err.message);
        setLoading(btn, false);
      }
    });
  </script>
</body>
</html>
