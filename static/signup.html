<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow — 회원가입</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center">
  <div class="bg-white shadow rounded-lg p-8 w-full max-w-sm">
    <h1 class="text-2xl font-bold text-center text-blue-600 mb-6">TaskFlow 가입</h1>
    <p id="error-msg" class="hidden bg-red-50 text-red-600 text-sm rounded p-2 mb-4"></p>
    <form id="signup-form" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">이메일</label>
        <input id="email" type="email" required placeholder="email@example.com"
          class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">비밀번호</label>
        <input id="password" type="password" required placeholder="비밀번호"
          class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>
      <button type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded py-2 text-sm transition">
        가입하기
      </button>
    </form>
    <p class="mt-4 text-center text-sm text-gray-500">
      이미 계정이 있으신가요? <a href="/" class="text-blue-600 hover:underline">로그인</a>
    </p>
  </div>
  <script src="/static/app.js"></script>
  <script>
    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        const data = await api('POST', '/api/auth/signup', {
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        });
        saveAuth(data.token, data.user);
        window.location.href = '/teams';
      } catch (err) {
        showError(err.message);
      }
    });
  </script>
</body>
</html>
