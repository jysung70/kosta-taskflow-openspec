<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow — 로그인</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center">
  <div class="bg-white shadow rounded-lg p-8 w-full max-w-sm">
    <div class="flex justify-center mb-2">
      <span class="bg-teal-600 text-white text-lg font-bold px-4 py-1 rounded">TaskFlow</span>
    </div>
    <h2 class="text-center text-gray-700 font-semibold text-lg mb-6">로그인</h2>
    <p id="error-msg" class="hidden bg-red-50 border border-red-200 text-red-600 text-sm rounded p-2 mb-4"></p>
    <form id="login-form" class="space-y-4">
      <div>
        <input id="email" type="email" required placeholder="이메일 입력"
          class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-400">
      </div>
      <div>
        <input id="password" type="password" required placeholder="••••••••"
          class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-400">
      </div>
      <button id="submit-btn" type="submit"
        class="w-full bg-teal-600 hover:bg-teal-700 text-white font-semibold rounded py-2 text-sm transition">
        로그인
      </button>
    </form>
    <p class="mt-4 text-center text-sm text-gray-500">
      계정이 없으신가요? <a href="/signup" class="text-teal-600 hover:underline">회원가입</a>
    </p>
  </div>
  <script src="/static/app.js"></script>
  <script>
    if (isLoggedIn()) redirectAfterAuth(getUser());
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      setLoading(btn, true);
      try {
        const data = await api('POST', '/api/auth/login', {
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        });
        saveAuth(data.token, data.user);
        redirectAfterAuth(data.user);
      } catch (err) {
        showError(err.message);
        setLoading(btn, false);
      }
    });
  </script>
</body>
</html>
